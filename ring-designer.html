<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ring Designer</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #fff;
      overflow: hidden;
    }

    /* ── HEADER ── */
    .header {
      height: 52px; background: #1A1A1A;
      display: flex; align-items: center; padding: 0 22px;
      flex-shrink: 0; z-index: 20;
    }
    .brand     { color: #B8963E; font-size: 16px; letter-spacing: 0.2em; font-weight: 700; text-transform: uppercase; }
    .brand-sep { width: 1px; height: 16px; background: #3A3A3A; margin: 0 14px; }
    .brand-sub { color: #777; font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; }

    /* ── LAYOUT ── */
    .app  { display: flex; flex-direction: column; height: 100vh; }
    .main { display: flex; flex: 1; overflow: hidden; }

    /* ── VIEWER ── */
    .viewer-wrap {
      flex: 1; position: relative;
      background: #fff;
    }
    #viewer { width: 100%; height: 100%; }

    /* ── LOADING ── */
    .loading {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      background: rgba(255,255,255,0.78); backdrop-filter: blur(2px);
      z-index: 10; transition: opacity 0.3s;
    }
    .loading.hidden { opacity: 0; pointer-events: none; }
    .spinner {
      width: 32px; height: 32px;
      border: 3px solid #DDD6CE; border-top-color: #B8963E;
      border-radius: 50%; animation: spin 0.75s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── CAM BUTTONS ── */
    .cam-btns {
      position: absolute; bottom: 16px; left: 50%; transform: translateX(-50%);
      display: flex; gap: 7px; z-index: 5;
    }
    .cam-btn {
      padding: 5px 13px; border: 1px solid rgba(200,190,180,0.7);
      background: rgba(255,255,255,0.9); backdrop-filter: blur(4px);
      border-radius: 20px; font-size: 11px; letter-spacing: 0.06em;
      cursor: pointer; color: #666; transition: all 0.15s; text-transform: uppercase;
    }
    .cam-btn:hover { color: #B8963E; border-color: #B8963E; }

    /* ── SIDEBAR ── */
    .sidebar {
      width: 440px; background: #fff;
      border-left: 1px solid #EAE4DC;
      overflow-y: auto; flex-shrink: 0;
    }
    .sidebar::-webkit-scrollbar { width: 4px; }
    .sidebar::-webkit-scrollbar-thumb { background: #E0D8D0; border-radius: 4px; }

    /* ── SECTION ── */
    .sec { padding: 16px 18px 14px; border-bottom: 1px solid #F2EDE6; }
    .sec-title {
      font-size: 10px; font-weight: 700; letter-spacing: 0.14em;
      text-transform: uppercase; color: #9A8570; margin-bottom: 12px;
    }

    /* ── COLOR ROW ── */
    .color-row  { display: flex; gap: 18px; }
    .color-group { flex: 1; }
    .color-label {
      font-size: 9px; font-weight: 700; letter-spacing: 0.1em;
      text-transform: uppercase; color: #B0A090; margin-bottom: 8px;
    }
    .swatch-row { display: flex; gap: 8px; }
    .swatch {
      width: 34px; height: 34px; border-radius: 50%;
      border: 2.5px solid transparent;
      box-shadow: 0 2px 6px rgba(0,0,0,0.15);
      cursor: pointer; transition: all 0.16s; padding: 0;
    }
    .swatch:hover { transform: scale(1.1); }
    .swatch.active {
      border-color: #B8963E;
      box-shadow: 0 0 0 3px rgba(184,150,62,0.2), 0 2px 6px rgba(0,0,0,0.18);
    }
    .sw-w { background: linear-gradient(135deg, #F0F0F0, #B8B8B8 60%, #DCDCDC); }
    .sw-y { background: linear-gradient(135deg, #F6D458, #C8940C 60%, #EAC040); }
    .sw-r { background: linear-gradient(135deg, #EAA898, #C06858 60%, #D88878); }

    /* ── STONE SHAPE GRID ── */
    .shape-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 7px; }
    .shape-card {
      display: flex; flex-direction: column; align-items: center;
      padding: 9px 5px 7px; border: 1.5px solid #E8E2D8;
      border-radius: 9px; background: #FAFAF8;
      cursor: pointer; transition: all 0.16s; gap: 5px; font: inherit;
    }
    .shape-card:hover  { border-color: #C8AA7A; background: #FDF9F3; }
    .shape-card.active { border-color: #B8963E; background: #FDF5E8; }
    .shape-card svg    { width: 36px; height: 36px; }
    .shape-card span   { font-size: 10px; color: #777; letter-spacing: 0.04em; }
    .shape-card.active span { color: #B8963E; font-weight: 600; }

    /* ── MOUNTING GRID ── */
    .mount-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 7px; }
    .mount-card {
      display: flex; flex-direction: column; align-items: center;
      padding: 8px 5px 7px; border: 1.5px solid #E8E2D8;
      border-radius: 9px; background: #fff;
      cursor: pointer; transition: all 0.16s; gap: 4px; font: inherit; text-align: center;
    }
    .mount-card:hover  { border-color: #C8AA7A; background: #fff; }
    .mount-card.active { border-color: #B8963E; background: #fff; }
    .mount-thumb { width: 100%; height: 85px; object-fit: contain; border-radius: 4px; transition: opacity 0.2s; }
    .mount-card:not(.active) .mount-thumb { opacity: 0.82; }
    .mount-card.active .mount-thumb { opacity: 1; }
    .mount-name { font-size: 9px; color: #666; line-height: 1.3; }
    .mount-card.active .mount-name { color: #B8963E; font-weight: 600; }
    .mount-code { font-size: 8px; color: #B0A890; letter-spacing: 0.04em; }

    /* ── STONE SIZE PILLS ── */
    .size-row { display: flex; flex-wrap: wrap; gap: 6px; }
    .size-pill {
      padding: 5px 13px; border: 1.5px solid #E8E2D8;
      border-radius: 20px; font-size: 11px; color: #666;
      background: #FAFAF8; cursor: pointer;
      transition: all 0.15s; font: inherit; letter-spacing: 0.04em;
    }
    .size-pill:hover  { border-color: #C8AA7A; color: #B8963E; background: #FDF9F3; }
    .size-pill.active { border-color: #B8963E; background: #FDF5E8; color: #B8963E; font-weight: 600; }

    @media (max-width: 700px) {
      html, body { overflow: auto; }
      .app  { height: auto; }
      .main { flex-direction: column; }
      .viewer-wrap { height: 60vw; min-height: 240px; }
      .sidebar { width: 100%; border-left: none; border-top: 1px solid #EAE4DC; }
    }
  </style>
</head>
<body>

<div class="app">
  <header class="header">
    <span class="brand">Ring Studio</span>
    <div class="brand-sep"></div>
    <span class="brand-sub">Design Your Own Ring</span>
  </header>

  <div class="main">

    <!-- 3D VIEWER -->
    <div class="viewer-wrap">
      <div id="viewer"></div>
      <div id="loading" class="loading"><div class="spinner"></div></div>


      <div class="cam-btns">
        <button class="cam-btn" data-cam="front">Front</button>
        <button class="cam-btn" data-cam="angle">Angle</button>
        <button class="cam-btn" data-cam="top">Top</button>
      </div>
    </div>

    <!-- SIDEBAR -->
    <aside class="sidebar">

      <!-- Metal Color -->
      <div class="sec">
        <div class="sec-title">Metal Color</div>
        <div class="color-row">
          <div class="color-group">
            <div class="color-label">Head</div>
            <div class="swatch-row">
              <button class="swatch sw-w active" data-hc="white"  title="White Gold"></button>
              <button class="swatch sw-y"        data-hc="yellow" title="Yellow Gold"></button>
              <button class="swatch sw-r"        data-hc="rose"   title="Rose Gold"></button>
            </div>
          </div>
          <div class="color-group">
            <div class="color-label">Mounting</div>
            <div class="swatch-row">
              <button class="swatch sw-w active" data-mc="white"  title="White Gold"></button>
              <button class="swatch sw-y"        data-mc="yellow" title="Yellow Gold"></button>
              <button class="swatch sw-r"        data-mc="rose"   title="Rose Gold"></button>
            </div>
          </div>
        </div>
      </div>

      <!-- Stone Shape -->
      <div class="sec">
        <div class="sec-title">Center Stone Shape</div>
        <div class="shape-grid" id="shape-grid"></div>
      </div>

      <!-- Stone Size -->
      <div class="sec">
        <div class="sec-title">Center Stone Size</div>
        <div class="size-row" id="size-row"></div>
      </div>

      <!-- Mounting -->
      <div class="sec">
        <div class="sec-title">Mounting</div>
        <div class="mount-grid" id="mount-grid"></div>
      </div>

    </aside>
  </div>
</div>

<script type="importmap">
{
  "imports": {
    "three":         "https://unpkg.com/three@0.163.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.163.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls }   from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader }      from 'three/addons/loaders/GLTFLoader.js';
import { DRACOLoader }     from 'three/addons/loaders/DRACOLoader.js';
import { items } from './files/data.js';

// ═══════════════════════════════════════════════════
//  DATA
// ═══════════════════════════════════════════════════
const HEAD_BASE  = 'files/Heads/';
const SHANK_BASE = 'files/Shanks/';
const TARGET_SIZE = 0.50;
const HEAD_OFFSET_Y = 0.015;

const METALS = {
  white:  { color: 0xD7D7D7, metalness: 1, roughness: 0.055, envMapIntensity: 2.85 },
  yellow: { color: 0xE3AF45, metalness: 1, roughness: 0.052, envMapIntensity: 2.95 },
  rose:   { color: 0xD98A74, metalness: 1, roughness: 0.058, envMapIntensity: 2.90 },
};

// Diamond material — balanced transmission so it looks like crystal not white fog
const GEM = { color: 0xDDEEFF, transmission: 0.80, roughness: 0.0, ior: 2.42, thickness: 3.0, dispersion: 3.5 };

const CAM_PRESETS = {
  front: new THREE.Vector3(0.18, 0.22, 1.1),
  angle: new THREE.Vector3(0.70, 0.45, 0.85),
  top:   new THREE.Vector3(0.04, 1.20, 0.25),
};

const HEAD_SVGS = {
  RD: `<circle cx="18" cy="18" r="14" fill="#EDE6DC" stroke="#9A8570" stroke-width="1.4"/>
       <circle cx="18" cy="18" r="7" stroke="#C8AA7A" stroke-dasharray="2 2.5" stroke-width="1" fill="none" opacity=".6"/>`,
  OV: `<ellipse cx="18" cy="18" rx="10" ry="14" fill="#EDE6DC" stroke="#9A8570" stroke-width="1.4"/>
       <ellipse cx="18" cy="18" rx="5.5" ry="8" stroke="#C8AA7A" stroke-dasharray="2 2.5" stroke-width="1" fill="none" opacity=".6"/>`,
  MQ: `<path d="M18 3 Q28 18 18 33 Q8 18 18 3Z" fill="#EDE6DC" stroke="#9A8570" stroke-width="1.4"/>
       <path d="M18 9 Q25 18 18 27 Q11 18 18 9Z" stroke="#C8AA7A" stroke-dasharray="2 2.5" stroke-width="1" fill="none" opacity=".6"/>`,
  EC: `<rect x="7" y="5" width="22" height="26" rx="3" fill="#EDE6DC" stroke="#9A8570" stroke-width="1.4"/>
       <rect x="11" y="9" width="14" height="18" rx="2" stroke="#C8AA7A" stroke-dasharray="2 2.5" stroke-width="1" fill="none" opacity=".6"/>`,
  PR: `<rect x="6" y="6" width="24" height="24" rx="1.5" fill="#EDE6DC" stroke="#9A8570" stroke-width="1.4"/>
       <rect x="11" y="11" width="14" height="14" rx="1" stroke="#C8AA7A" stroke-dasharray="2 2.5" stroke-width="1" fill="none" opacity=".6"/>`,
  PS: `<path d="M18 5 C18 5 29 15 29 23 C29 29 24 33 18 33 C12 33 7 29 7 23 C7 15 18 5 18 5Z" fill="#EDE6DC" stroke="#9A8570" stroke-width="1.4"/>`,
};

const HEADS_DATA = ['RD','OV','MQ','EC','PR','PS'].map(code => ({
  code,
  label: items.heads[code].label,
  sizes: Object.keys(items.heads[code].sizes),
  svg: HEAD_SVGS[code],
}));

// Per-shank Y fine-tune (viewer units).  Negative = slide head down, positive = raise.
// Add an entry here whenever a shank still shows a gap after the default placement.
const HEAD_Y_OVERRIDES = {
  SP1005: 0.00,
};

const SHANKS_DATA = Object.entries(items.shanks).map(([code, data]) => ({
  code,
  name: data.name,
  has075: !!data.files['075'],
  headY: HEAD_Y_OVERRIDES[code] ?? 0.00,
}));

// ═══════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════
let ringAssembly   = null;
let shankMesh      = null;
let headMesh       = null;
let activeShapeIdx = 0;
let activeSizeIdx  = (() => { const i = HEADS_DATA[0].sizes.indexOf('1.00'); return i >= 0 ? i : 0; })();
let activeShankIdx = 0;
let camTarget      = null;
let autoTimer      = null;
let pendingLoads   = 0;
let rebuildToken   = 0;
const modelCache   = {};
let currentHeadColor  = 'white';
let currentMountColor = 'white';

// ── path helpers ──
function thumbColorName(c) { return c[0].toUpperCase() + c.slice(1); }
function shankThumbSrc(code, color) {
  const col = thumbColorName(color);
  return `files/thumb/Shanks/${col}/${code}.${col}.jpg`;
}
function updateMountThumbs(color) {
  document.querySelectorAll('.mount-thumb').forEach(img => {
    img.src = shankThumbSrc(img.dataset.code, color);
  });
}
function getShankSuffix(caratStr) {
  const c = parseFloat(caratStr);
  return c >= 3.00 ? '300' : c >= 1.50 ? '200' : '075';
}
function getActiveShape() { return HEADS_DATA[activeShapeIdx]; }
function getActiveSize()  { return getActiveShape().sizes[activeSizeIdx]; }
function getActiveShank() { return SHANKS_DATA[activeShankIdx]; }
function getHeadFilePath() {
  const sh = getActiveShape(), sz = getActiveSize();
  return `${sh.code}-${sz.replace('.', '')}.glb`;
}
function getShankFilePath() {
  let suffix = getShankSuffix(getActiveSize());
  const sk = getActiveShank();
  if (suffix === '075' && !sk.has075) suffix = '200';
  return `${sk.code}-${suffix}.glb`;
}

// ═══════════════════════════════════════════════════
//  RENDERER
// ═══════════════════════════════════════════════════
const container = document.getElementById('viewer');
const renderer  = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(container.clientWidth, container.clientHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.22;
container.appendChild(renderer.domElement);

// ═══════════════════════════════════════════════════
//  SCENE + ENV
// ═══════════════════════════════════════════════════
const scene = new THREE.Scene();
// Warm off-white background — matches CSS so seams invisible,
// AND gives gem transmission something realistic to refract (not pure white)
scene.background = new THREE.Color(0xFFFFFF);

const pmrem = new THREE.PMREMGenerator(renderer);
pmrem.compileEquirectangularShader();

function createJewelryStudioEnvTexture() {
  const w = 1024, h = 512;
  const canvas = document.createElement('canvas');
  canvas.width = w; canvas.height = h;
  const ctx = canvas.getContext('2d');

  const base = ctx.createLinearGradient(0, 0, 0, h);
  base.addColorStop(0.00, '#ffffff');
  base.addColorStop(0.42, '#f7f8fa');
  base.addColorStop(0.58, '#eceff2');
  base.addColorStop(1.00, '#cfd3d8');
  ctx.fillStyle = base;
  ctx.fillRect(0, 0, w, h);

  function band(cx, bw, color, alpha, y0 = 0, y1 = h) {
    const g = ctx.createLinearGradient(cx - bw * 0.5, 0, cx + bw * 0.5, 0);
    g.addColorStop(0.00, `rgba(${color},0)`);
    g.addColorStop(0.35, `rgba(${color},${alpha})`);
    g.addColorStop(0.65, `rgba(${color},${alpha})`);
    g.addColorStop(1.00, `rgba(${color},0)`);
    ctx.fillStyle = g;
    ctx.fillRect(cx - bw * 0.5, y0, bw, y1 - y0);
  }

  // Dark softboxes create the black ribbons visible in polished jewelry renders.
  band(w * 0.08, 110, '8,9,10', 0.92);
  band(w * 0.31, 75,  '15,16,18', 0.58, h * 0.05, h * 0.95);
  band(w * 0.69, 80,  '15,16,18', 0.62, h * 0.04, h * 0.96);
  band(w * 0.92, 110, '8,9,10', 0.88);

  // Bright cards keep rounded bands creamy and reflective.
  band(w * 0.50, 150, '255,255,255', 0.90, 0, h * 0.78);
  band(w * 0.18, 70,  '255,255,255', 0.60, 0, h * 0.72);
  band(w * 0.82, 70,  '255,255,255', 0.58, 0, h * 0.72);

  const floor = ctx.createRadialGradient(w * 0.5, h * 0.90, 0, w * 0.5, h * 0.90, w * 0.42);
  floor.addColorStop(0, 'rgba(40,42,45,0.30)');
  floor.addColorStop(0.28, 'rgba(120,124,130,0.14)');
  floor.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.fillStyle = floor;
  ctx.fillRect(0, h * 0.56, w, h * 0.44);

  const tex = new THREE.CanvasTexture(canvas);
  tex.mapping = THREE.EquirectangularReflectionMapping;
  tex.colorSpace = THREE.SRGBColorSpace;
  tex.needsUpdate = true;
  return tex;
}

const studioEnv = createJewelryStudioEnvTexture();
scene.environment = pmrem.fromEquirectangular(studioEnv).texture;
scene.environmentIntensity = 2.35;
studioEnv.dispose();
pmrem.dispose();

function createGemRefractionEnv() {
  const envScene = new THREE.Scene();
  envScene.background = new THREE.Color(0xf2f4f7);

  const panels = [];
  const addPanel = (w, h, color, intensity, position, rotation) => {
    const mat = new THREE.MeshBasicMaterial({
      color: new THREE.Color(color).multiplyScalar(intensity),
      side: THREE.DoubleSide,
    });
    const mesh = new THREE.Mesh(new THREE.PlaneGeometry(w, h), mat);
    mesh.position.copy(position);
    mesh.rotation.copy(rotation);
    envScene.add(mesh);
    panels.push(mesh);
  };

  addPanel(7.5, 2.4, 0xffffff, 0.90, new THREE.Vector3(0, 3.3, 0.2), new THREE.Euler(Math.PI / 2, 0, 0));
  addPanel(3.4, 2.0, 0xffffff, 0.48, new THREE.Vector3(2.7, 1.5, 1.8), new THREE.Euler(0, -0.75, 0));
  addPanel(3.4, 2.0, 0xffffff, 0.45, new THREE.Vector3(-2.7, 1.4, 1.6), new THREE.Euler(0, 0.78, 0));
  addPanel(5.0, 1.6, 0xffffff, 0.24, new THREE.Vector3(0, 0.8, -3.4), new THREE.Euler(0, Math.PI, 0));
  addPanel(1.0, 1.0, 0xffffff, 0.56, new THREE.Vector3(0.45, 2.2, 2.7), new THREE.Euler(0, Math.PI, 0));
  addPanel(0.9, 0.9, 0xffffff, 0.50, new THREE.Vector3(-0.65, 2.0, 2.4), new THREE.Euler(0.08, Math.PI * 0.92, 0));

  const strip = new THREE.Mesh(
    new THREE.PlaneGeometry(7.0, 0.85),
    new THREE.MeshBasicMaterial({
      color: new THREE.Color(0xd8dde6).multiplyScalar(0.12),
      side: THREE.DoubleSide,
    })
  );
  strip.position.set(0, 0.15, 3.0);
  envScene.add(strip);
  panels.push(strip);

  const cubeRT = new THREE.WebGLCubeRenderTarget(512, {
    minFilter: THREE.LinearFilter,
    magFilter: THREE.LinearFilter,
    generateMipmaps: false,
    depthBuffer: false,
    colorSpace: THREE.LinearSRGBColorSpace,
  });
  new THREE.CubeCamera(0.1, 20, cubeRT).update(renderer, envScene);

  for (const panel of panels) {
    panel.geometry.dispose();
    panel.material.dispose();
  }

  return cubeRT.texture;
}

const gemRefractionEnv = createGemRefractionEnv();

// ═══════════════════════════════════════════════════
//  CAMERA + CONTROLS
// ═══════════════════════════════════════════════════
const camera = new THREE.PerspectiveCamera(30, container.clientWidth / container.clientHeight, 0.01, 100);
camera.position.copy(CAM_PRESETS.front);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping  = true;
controls.dampingFactor  = 0.06;
controls.target.set(0, 0.05, 0);
controls.minDistance    = 0.4;
controls.maxDistance    = 4;
controls.autoRotate     = true;
controls.autoRotateSpeed = 1.2;

renderer.domElement.addEventListener('pointerdown', () => {
  controls.autoRotate = false; clearTimeout(autoTimer); camTarget = null;
});
renderer.domElement.addEventListener('pointerup', () => {
  autoTimer = setTimeout(() => { controls.autoRotate = true; }, 3000);
});

// ═══════════════════════════════════════════════════
//  LIGHTS
// ═══════════════════════════════════════════════════
scene.add(new THREE.AmbientLight(0xffffff, 0.25));
const key  = new THREE.DirectionalLight(0xFFF8F0, 1.15); key.position.set(2, 4, 3);    scene.add(key);
const fill = new THREE.DirectionalLight(0xF0F4FF, 0.55); fill.position.set(-3, 2, 4);  scene.add(fill);
const rim  = new THREE.DirectionalLight(0xFFF8EC, 0.45); rim.position.set(0, 3, -4);  scene.add(rim);
const bot  = new THREE.DirectionalLight(0xE8EEFF, 0.18); bot.position.set(0, -3, 2);  scene.add(bot);

// ═══════════════════════════════════════════════════
//  CONTACT SHADOW
// ═══════════════════════════════════════════════════
const shadowTex = (() => {
  const s = 128, c = document.createElement('canvas');
  c.width = c.height = s;
  const ctx = c.getContext('2d');
  const g = ctx.createRadialGradient(s/2, s/2, 0, s/2, s/2, s/2);
  g.addColorStop(0,   'rgba(0,0,0,0.10)');
  g.addColorStop(0.4, 'rgba(0,0,0,0.04)');
  g.addColorStop(1,   'rgba(0,0,0,0)');
  ctx.fillStyle = g; ctx.fillRect(0, 0, s, s);
  return new THREE.CanvasTexture(c);
})();
const gnd = new THREE.Mesh(
  new THREE.PlaneGeometry(TARGET_SIZE * 2.2, TARGET_SIZE * 2.2),
  new THREE.MeshBasicMaterial({ map: shadowTex, transparent: true, depthWrite: false })
);
gnd.rotation.x = -Math.PI / 2;
gnd.position.y = -TARGET_SIZE * 0.26;
scene.add(gnd);

// ═══════════════════════════════════════════════════
//  TRANSITION
// ═══════════════════════════════════════════════════
function tween(from, to, ms, ease, onUpdate, onDone) {
  const t0 = performance.now();
  (function step(now) {
    const p = Math.min((now - t0) / ms, 1);
    onUpdate(from + (to - from) * ease(p));
    p < 1 ? requestAnimationFrame(step) : onDone?.();
  })(t0);
}
const easeInOut = p => p < 0.5 ? 2*p*p : 1 - Math.pow(-2*p+2, 2)/2;

function setOpacity(obj, v) {
  obj.traverse(c => {
    if (!c.isMesh) return;
    (Array.isArray(c.material) ? c.material : [c.material])
      .forEach(m => { m.transparent = true; m.opacity = v; });
  });
}

function crossDissolve(oldObj, newObj) {
  setOpacity(newObj, 0);
  scene.add(newObj);
  newObj.updateMatrixWorld(true);
  tween(0, 1, 380, easeInOut, v => {
    if (oldObj) setOpacity(oldObj, 1 - v);
    setOpacity(newObj, v);
  }, () => {
    if (oldObj) scene.remove(oldObj);
    newObj.traverse(c => {
      if (!c.isMesh) return;
      (Array.isArray(c.material) ? c.material : [c.material])
        .forEach(m => { m.opacity = 1; m.transparent = m.transmission > 0; });
    });
  });
}

//  NORMALISE
// ═══════════════════════════════════════════════════
function getModelKey(base, file) {
  return `${base}${file}`;
}

function ensureModel(base, file) {
  const key = getModelKey(base, file);
  if (modelCache[key]) return Promise.resolve(modelCache[key]);
  return new Promise((resolve, reject) => {
    loader.load(
      base + file,
      gltf => {
        modelCache[key] = gltf.scene;
        resolve(gltf.scene);
      },
      undefined,
      reject
    );
  });
}

function fitAssemblyGroup(group, shank) {
  shank.updateMatrixWorld(true);
  const shankBox = new THREE.Box3().setFromObject(shank);
  const shankSize = shankBox.getSize(new THREE.Vector3());
  const shankMaxDim = Math.max(shankSize.x, shankSize.y, shankSize.z);
  const scale = shankMaxDim > 0 ? TARGET_SIZE / shankMaxDim : 1;

  group.scale.setScalar(scale);
  group.updateMatrixWorld(true);

  const fullBox = new THREE.Box3().setFromObject(group);
  const fullCenter = fullBox.getCenter(new THREE.Vector3());
  group.position.copy(fullCenter.multiplyScalar(-1));
  group.updateMatrixWorld(true);
}

function getShankSeatY(shank) {
  shank.updateMatrixWorld(true);
  const box = new THREE.Box3().setFromObject(shank);
  const size = box.getSize(new THREE.Vector3());
  const topHalfY = box.min.y + size.y * 0.50;
  const centerBandX = Math.max(size.x * 0.18, TARGET_SIZE * 0.10);
  const centerBandZ = Math.max(size.z * 0.36, TARGET_SIZE * 0.10);
  const candidates = [];
  const v = new THREE.Vector3();

  shank.traverse(c => {
    if (!c.isMesh) return;
    const pos = c.geometry.attributes.position;
    if (!pos) return;
    for (let i = 0; i < pos.count; i++) {
      v.fromBufferAttribute(pos, i).applyMatrix4(c.matrixWorld);
      if (v.y > topHalfY && Math.abs(v.x) < centerBandX && Math.abs(v.z) < centerBandZ) {
        candidates.push(v.y);
      }
    }
  });

  if (candidates.length) {
    candidates.sort((a, b) => a - b);
    return candidates[Math.floor((candidates.length - 1) * 0.82)];
  }

  return box.max.y;
}

function buildRingAssembly(shankSrc, headSrc, headY = 0) {
  const assembly = new THREE.Group();
  const shank = shankSrc.clone(true);
  const head  = headSrc.clone(true);

  shank.updateMatrixWorld(true);
  const shankBoxRaw = new THREE.Box3().setFromObject(shank);
  const shankCenter = shankBoxRaw.getCenter(new THREE.Vector3());
  const shankMaxDim = Math.max(...shankBoxRaw.getSize(new THREE.Vector3()).toArray());
  const shankScale = shankMaxDim > 0 ? TARGET_SIZE / shankMaxDim : 1;

  shank.scale.setScalar(shankScale);
  shank.position.copy(shankCenter.clone().multiplyScalar(-shankScale));
  shank.updateMatrixWorld(true);

  head.updateMatrixWorld(true);
  const headBoxRaw = new THREE.Box3().setFromObject(head);
  const headCenter = headBoxRaw.getCenter(new THREE.Vector3());
  const headMaxDim = Math.max(...headBoxRaw.getSize(new THREE.Vector3()).toArray());
  let headScale = shankScale;
  if (headMaxDim * headScale > TARGET_SIZE * 0.72) {
    headScale *= (TARGET_SIZE * 0.72) / (headMaxDim * headScale);
  }

  head.scale.setScalar(headScale);
  head.position.copy(headCenter.clone().multiplyScalar(-headScale));
  head.updateMatrixWorld(true);

  const seatY = getShankSeatY(shank);
  const headBox = new THREE.Box3().setFromObject(head);
  const seatTuck = TARGET_SIZE * 0.10;
  head.position.y += seatY - headBox.min.y - seatTuck + HEAD_OFFSET_Y + headY;

  applyMaterials(shank, true);
  applyMaterials(head, false);

  assembly.add(shank);
  assembly.add(head);

  assembly.updateMatrixWorld(true);
  const fullCenter = new THREE.Box3().setFromObject(assembly).getCenter(new THREE.Vector3());
  assembly.position.copy(fullCenter.multiplyScalar(-1));
  assembly.updateMatrixWorld(true);

  return { assembly, shank, head };
}

// ═══════════════════════════════════════════════════════════════
//  GEM RAY-TRACER  — exact iJewel3D / 3D Jewelry Viewer approach
//  Step 1: bake gem interior face-normals into a 256px CubeMap once
//  Step 2: GLSL shader traces 4 light bounces per pixel with chromatic
//          dispersion using the EXACT procedural env from iJewel3D source
// ═══════════════════════════════════════════════════════════════
function buildGemMaterial(geometry) {
  // ── centre & measure gem ──
  const geo = geometry.clone();
  const tmpBox = new THREE.Box3().setFromBufferAttribute(geo.attributes.position);
  const ctr = tmpBox.getCenter(new THREE.Vector3());
  geo.applyMatrix4(new THREE.Matrix4().makeTranslation(-ctr.x, -ctr.y, -ctr.z));

  const pos = geo.attributes.position.array;
  let minR = Infinity, maxR = 0;
  for (let i = 0; i < pos.length; i += 3) {
    const d = Math.sqrt(pos[i]*pos[i] + pos[i+1]*pos[i+1] + pos[i+2]*pos[i+2]);
    if (d < minR) minR = d;
    if (d > maxR) maxR = d;
  }
  if (!isFinite(minR) || minR <= 0) minR = maxR * 0.4;

  // ── bake interior cube map (face normal + depth per texel) ──
  const cubeRT = new THREE.WebGLCubeRenderTarget(512, {
    minFilter: THREE.NearestFilter, magFilter: THREE.NearestFilter,
    generateMipmaps: false, depthBuffer: false,
    colorSpace: THREE.LinearSRGBColorSpace,
  });
  const bakeMat = new THREE.ShaderMaterial({
    side: THREE.BackSide, blending: THREE.NoBlending,
    uniforms: { u0: { value: minR }, u1: { value: maxR } },
    vertexShader: `varying vec3 vP,vN;
      void main(){vP=position;vN=normalize(normal);
        gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1);}`,
    fragmentShader: `precision mediump float;
      uniform float u0,u1;varying vec3 vP,vN;
      void main(){gl_FragColor=vec4(0.5+0.5*normalize(vN),(length(vP)-u0)/(u1-u0));}`,
  });
  const bakeScene = new THREE.Scene();
  bakeScene.add(new THREE.Mesh(geo, bakeMat));
  new THREE.CubeCamera(minR * 0.01, maxR * 10, cubeRT).update(renderer, bakeScene);

  // ── ray-tracing gem shader ──
  // Physics note on IOR conventions used below:
  //   fresnel(i, n, ior): ior = n_transmitted / n_incident
  //   refract(I, N, eta): eta = n_incident / n_transmitted  (GLSL spec)
  //   ∴ for gem→air: fresnel uses inv=1/n, refract uses ior=n  (TIR fires when eta>1)
  //   ∴ for air→gem: fresnel uses n,       refract uses inv=1/n
  const u = {
    uEye:    { value: new THREE.Vector3() },
    uAbsorb: { value: new THREE.Vector3(0.00016, 0.00015, 0.00014) },
    uDisp:   { value: new THREE.Vector3(2.4025, 2.4200, 2.4375) },
    uGemTint: { value: new THREE.Color(0xBBBBBB) },
    uGemMap: { value: cubeRT.texture },
    uGemEnvMap: { value: gemRefractionEnv },
    uGemEnvIntensity: { value: 1.55 },
    uReflStrength: { value: 0.13 },
    uMinR:   { value: minR },
    uMaxR:   { value: maxR },
    uCtr:    { value: ctr },
    uEnvRot: { value: new THREE.Matrix4() },
  };

  const mat = new THREE.ShaderMaterial({
    uniforms: u,
    blending: THREE.NoBlending,
    vertexShader: `
      varying vec3 vPos, vNor;
      void main() {
        gl_Position = projectionMatrix * modelViewMatrix * vec4(position,1.0);
        vPos = position;
        vNor = normalize(normal);
      }`,
    fragmentShader: `
      precision highp float;
      uniform vec3 uEye, uAbsorb, uDisp, uCtr, uGemTint;
      uniform float uMinR, uMaxR;
      uniform float uGemEnvIntensity, uReflStrength;
      uniform mat4  uEnvRot;
      uniform samplerCube uGemMap, uGemEnvMap;
      varying vec3 vPos, vNor;

      // ── Diamond studio environment ──
      // Two layers: soft area lights give most facets a base brightness,
      // tight point lights add the crisp sparkle flash on top.
      vec3 gemEnv(vec3 d) {
        d = normalize((uEnvRot * vec4(d,0.0)).xyz);

        float up = clamp(d.y * 0.5 + 0.5, 0.0, 1.0);
        float horizon = pow(1.0 - abs(d.y), 2.15);

        vec3 sampled = textureCube(uGemEnvMap, d).rgb;
        vec3 env = mix(vec3(0.62, 0.64, 0.68), sampled, 0.55) * uGemEnvIntensity;
        vec3 baseLift =
          vec3(0.090, 0.094, 0.100) * (0.32 + 0.68 * pow(up, 0.95)) +
          vec3(0.030, 0.032, 0.036) * (0.18 + 0.42 * horizon);

        float B0 = pow(max(0.0, dot(d, normalize(vec3( 0.00, 0.99, 0.14)))), 18.0) * 0.15;
        float B1 = pow(max(0.0, dot(d, normalize(vec3( 0.48, 0.83, 0.28)))), 24.0) * 0.08;
        float B2 = pow(max(0.0, dot(d, normalize(vec3(-0.50, 0.82, 0.18)))), 24.0) * 0.08;

        float pinA = pow(max(0.0, dot(d, normalize(vec3( 0.00, 0.99, 0.10)))), 140.0) * 0.07;
        float pinB = pow(max(0.0, dot(d, normalize(vec3( 0.28, 0.94, 0.16)))), 110.0) * 0.04;
        float pinC = pow(max(0.0, dot(d, normalize(vec3(-0.30, 0.92, 0.10)))), 110.0) * 0.035;

        float darkBand = pow(max(0.0, dot(d, normalize(vec3(0.0, -0.03, 1.0)))), 8.0) * 0.006;
        vec3 softboxes = vec3(1.00, 1.01, 1.02) * (B0 + B1 + B2);
        vec3 pinFire = vec3(1.03, 1.01, 0.99) * (pinA + pinB + pinC);

        return max(env * 0.82 + baseLift + softboxes + pinFire - vec3(darkBand), vec3(0.16));
      }

      float fresnel(vec3 i, vec3 n, float ior) {
        float cI = abs(dot(i, n));
        float s2 = (1.0/ior) * (1.0/ior) * (1.0 - cI*cI);
        if (s2 >= 1.0) return 1.0; // TIR
        float cT = sqrt(1.0 - s2);
        float rs  = (cI - ior*cT) / (cI + ior*cT);
        float rp  = (ior*cT - cI) / (ior*cT + cI);
        return 0.5 * (rs*rs + rp*rp);
      }

      // ── Binary-search ray→face hit via baked normal cube map ──
      float gemHit(vec3 p, vec3 d, out vec3 hn) {
        float dp    = dot(p, d);
        float delta = sqrt(max(0.0, dp*dp - dot(p,p) + uMaxR*uMaxR));
        float t0 = 0.0, t1 = -dp + delta;
        for (int i = 0; i < 12; i++) {
          float tm = 0.5*(t0+t1);
          vec3  pp = p + tm*d;
          vec4  s  = textureCube(uGemMap, normalize(pp));
          float r  = mix(uMinR, uMaxR, s.a);
          vec3  nn = normalize(2.0*s.rgb - 1.0);
          if (length(pp) > r && dot(d, nn) > 0.0) t1 = tm; else t0 = tm;
        }
        float t = 0.5*(t0+t1);
        vec4 s = textureCube(uGemMap, normalize(p + t*d));
        hn = normalize(2.0*s.rgb - 1.0);
        return t;
      }

      // ── Physically correct internal bounce trace ──
      // Inside gem hitting a face: gem(ior)→air(1)
      //   refract eta = n_i/n_t = ior   (GLSL refract returns 0 on TIR when eta>1) ✓
      //   fresnel ior_param = n_t/n_i = inv                                          ✓
      vec3 traceChannel(vec3 p, vec3 d, float ior) {
        float inv  = 1.0 / ior;
        vec3  col  = vec3(0.0);
        float w    = 1.0;
        float dist = 0.0;

        for (int i = 0; i < 6; i++) {
          vec3  hn;
          float t  = gemHit(p, d, hn);
          dist    += t;
          p       += t * d;

          // bakeMat uses side:BackSide but is a custom ShaderMaterial — Three.js does NOT
          // auto-flip normals in custom shaders, so hn = front-face (OUTWARD) normal.
          // -hn = INWARD normal → d·(-hn) < 0 for rays heading toward face ← correct GLSL sign.
          // eta = ior (n_gem/n_air > 1) → TIR fires when incidence angle > critical angle ~24°
          vec3  rf  = refract(d, -hn, ior);
          bool  tir = (dot(rf, rf) < 0.01);

          // gem→air Fresnel: ior_param = n_t/n_i = 1/n_gem = inv
          float R = tir ? 1.0 : fresnel(d, -hn, inv);

          if (!tir) {
            col += w * (1.0 - R) * gemEnv(rf) * exp(-uAbsorb * dist);
          }

          w *= R;
          d  = reflect(d, -hn);
          if (w < 0.004) break;
        }
        return col + w * gemEnv(d) * exp(-uAbsorb * dist);
      }

      void main() {
        vec3 lp  = vPos - uCtr;
        vec3 eye = normalize(lp - (uEye - uCtr));
        vec3 n   = normalize(vNor);

        // Entry: air(1)→gem(ior), refract eta=inv, fresnel ior_param=ior
        vec3 rc = traceChannel(lp, refract(eye, n, 1.0/uDisp.x), uDisp.x);
        vec3 gc = traceChannel(lp, refract(eye, n, 1.0/uDisp.y), uDisp.y);
        vec3 bc = traceChannel(lp, refract(eye, n, 1.0/uDisp.z), uDisp.z);
        float R_entry = fresnel(eye, n, uDisp.y);
        float faceOn = pow(clamp(abs(dot(eye, n)), 0.0, 1.0), 4.0);
        vec3 traced = max(vec3(rc.r, gc.g, bc.b), vec3(0.0));
        vec3 attenuation = mix(vec3(1.0), uGemTint, 0.03);
        traced *= attenuation;

        vec3 reflection = gemEnv(reflect(eye,n)) * (uReflStrength * mix(1.18, 0.92, faceOn));
        vec3 faceLight = gemEnv(-eye) * mix(0.052, 0.020, faceOn);
        vec3 tableLift = vec3(0.030, 0.032, 0.036) * faceOn;
        traced = pow(traced, vec3(1.01 + faceOn * 0.025)) + tableLift;

        vec3 finalColor = traced * (1.0 - R_entry) + reflection * R_entry + faceLight;
        vec3 compressed = finalColor / (1.0 + finalColor * 0.46);
        finalColor = mix(finalColor, compressed, 0.14 + faceOn * 0.24);
        gl_FragColor = vec4(finalColor, 1.0);
        #if 0
        {
        vec3 rc = traceChannel(lp, refract(eye, n, 1.0/uDisp.x), uDisp.x);
        vec3 gc = traceChannel(lp, refract(eye, n, 1.0/uDisp.y), uDisp.y);
        vec3 bc = traceChannel(lp, refract(eye, n, 1.0/uDisp.z), uDisp.z);
        vec3 gem = vec3(rc.r, gc.g, bc.b) * uBoost;

        // Entry Fresnel (air→gem): controls transmission vs surface reflection
        float R_entry = fresnel(eye, n, uDisp.y);

        // Surface reflection: studio lights off the polished facet
        vec3 spark = gemEnv(reflect(eye, n)) * uReflectivity * 2.0;
        vec3 facetShade = mix(vec3(0.70, 0.74, 0.80), vec3(1.0), pow(abs(dot(eye, n)), 0.52));
        vec3 tableLift = vec3(0.020, 0.022, 0.026) * pow(abs(dot(eye, n)), 2.0);

        vec3 outColor = gem * facetShade * (1.0 - R_entry) + spark * R_entry + tableLift;
        outColor *= facetContrast(lp, n, eye);
        outColor = (outColor / (vec3(1.0) + outColor * 0.42)) * 1.18;
        gl_FragColor = vec4(pow(max(outColor, vec3(0.0)), vec3(uGamma)), 1.0);
        }
        #endif
      }`,
  });

  // Update eye position and env rotation each frame
  mat.onBeforeRender = (rdr, scn, cam, geom, obj) => {
    obj.updateWorldMatrix(true, false);
    const invWorld = obj.matrixWorld.clone().invert();
    u.uEye.value.copy(cam.position).applyMatrix4(invWorld);
    // Keep virtual lights fixed in world space as camera orbits
    u.uEnvRot.value.extractRotation(obj.matrixWorld);
  };

  return mat;
}

// Tag the single center gem in a head GLB (largest-vertex-count mesh)
function tagHeadGem(group) {
  let best = null, maxVerts = 0;
  group.traverse(c => {
    if (!c.isMesh) return;
    const name = (c.name || '').toLowerCase();
    if (/prong|claw|setting|mount|basket|band|rail|wire/.test(name)) return;
    if (/gem|stone|diamond|center|crystal/.test(name)) { best = c; maxVerts = Infinity; return; }
    const v = c.geometry.attributes.position?.count || 0;
    if (v > maxVerts) { maxVerts = v; best = c; }
  });
  if (best) best._isGem = true;
}

// Tag pavé / accent stones in a shank GLB.
// Strategy: collect all meshes, find the band (largest), tag everything significantly
// smaller as gem (pavé stones have far fewer verts than the band mesh).
function tagShankGems(group) {
  const meshes = [];
  group.traverse(c => { if (c.isMesh) meshes.push(c); });
  if (meshes.length <= 1) return;

  // Name-based detection first
  let anyNamed = false;
  for (const c of meshes) {
    const name = `${c.name || ''} ${c.material?.name || ''}`.toLowerCase();
    if (/gem|stone|diamond|crystal|pave|pavé|accent/.test(name)) { c._isGem = true; anyNamed = true; }
  }
  if (anyNamed) return;

  // Fallback: accent stones are separate small meshes on most shanks.
  const maxV = Math.max(...meshes.map(c => c.geometry.attributes.position?.count || 0));
  const candidates = meshes.filter(c => {
    const v = c.geometry.attributes.position?.count || 0;
    return v > 0 && v < maxV * 0.16;
  });
  if (candidates.length >= 4) candidates.forEach(c => c._isGem = true);
}

function isGemMesh(c) { return c._isGem === true; }

function prepareDiamondGeometry(geometry) {
  const geo = geometry.index ? geometry.toNonIndexed() : geometry.clone();
  geo.computeVertexNormals();
  geo.computeBoundingSphere();
  geo.computeBoundingBox();
  return geo;
}

function createAccentDiamondMaterial() {
  return new THREE.MeshPhysicalMaterial({
    color: 0xEEF4FF, roughness: 0.0, metalness: 0,
    transmission: 0.90, ior: 2.42, thickness: 0.3,
    dispersion: 1.5, specularIntensity: 1.0, reflectivity: 1.0,
    envMapIntensity: 6.0, transparent: true,
  });
}

function applyMaterials(mesh, isShank) {
  const m = isShank ? METALS[currentMountColor] : METALS[currentHeadColor];

  // Tag gems — pavé accents for shank, center stone for head
  if (isShank) tagShankGems(mesh);
  else         tagHeadGem(mesh);

  mesh.traverse(c => {
    if (!c.isMesh) return;
    c.geometry.computeVertexNormals();

    if (isGemMesh(c)) {
      if (!isShank) {
        // Center stone → full ray-tracing gem shader (iJewel3D approach)
        c.material = buildGemMaterial(c.geometry);
      } else {
        // Pavé accent stones — lightweight crystal material
        c.material = createAccentDiamondMaterial();
      }
    } else {
      // Metal
      c.material = new THREE.MeshPhysicalMaterial({
        color: m.color, metalness: m.metalness, roughness: m.roughness,
        envMapIntensity: m.envMapIntensity,
        reflectivity: 0.5,
        clearcoat: 0.16,
        clearcoatRoughness: 0.055,
        specularIntensity: 1.0,
        side: THREE.DoubleSide,
      });
    }
  });
}

function tweenColor(mesh, targetName, isShank) {
  const target  = METALS[targetName];
  const toColor = new THREE.Color(target.color);
  const states  = [];
  mesh.traverse(c => {
    if (!c.isMesh || isGemMesh(c)) return; // skip gems always
    states.push({
      mat: c.material,
      from: c.material.color.clone(),
      fromRoughness: c.material.roughness,
      fromEnv: c.material.envMapIntensity,
    });
  });
  tween(0, 1, 500, easeInOut, v => {
    states.forEach(({ mat, from, fromRoughness, fromEnv }) => {
      mat.color.lerpColors(from, toColor, v);
      mat.roughness = THREE.MathUtils.lerp(fromRoughness, target.roughness, v);
      mat.envMapIntensity = THREE.MathUtils.lerp(fromEnv, target.envMapIntensity, v);
      mat.needsUpdate = true;
    });
  });
}

// ═══════════════════════════════════════════════════
//  LOAD SHANK
// ═══════════════════════════════════════════════════
async function rebuildAssembly() {
  const token = ++rebuildToken;
  const old = ringAssembly;
  showLoading();

  const headFile  = getHeadFilePath();
  const shankFile = getShankFilePath();
  const headY     = getActiveShank().headY;

  try {
    const [shankSrc, headSrc] = await Promise.all([
      ensureModel(SHANK_BASE, shankFile),
      ensureModel(HEAD_BASE,  headFile),
    ]);

    if (token !== rebuildToken) return;

    const built = buildRingAssembly(shankSrc, headSrc, headY);
    ringAssembly = built.assembly;
    shankMesh = built.shank;
    headMesh  = built.head;
    crossDissolve(old, ringAssembly);
  } catch (err) {
    console.error('Failed to rebuild ring assembly', err);
  } finally {
    hideLoading();
  }
}

  const btn = document.createElement('button');
  btn.className = 'shape-card' + (i === 0 ? ' active' : '');
  btn.dataset.idx = i;
  btn.innerHTML = `<svg viewBox="0 0 36 36">${h.svg}</svg><span>${h.label}</span>`;
  shapeGrid.appendChild(btn);
});

// Stone sizes
function buildSizeUI() {
  const sizeRow = document.getElementById('size-row');
  sizeRow.innerHTML = '';
  getActiveShape().sizes.forEach((sz, i) => {
    const btn = document.createElement('button');
    btn.className = 'size-pill' + (i === activeSizeIdx ? ' active' : '');
    btn.dataset.idx = i;
    btn.textContent = sz + ' ct';
    sizeRow.appendChild(btn);
  });
}
buildSizeUI();

// Mounting styles
const mountGrid = document.getElementById('mount-grid');
SHANKS_DATA.forEach((s, i) => {
  const btn = document.createElement('button');
  btn.className = 'mount-card' + (i === 0 ? ' active' : '');
  btn.dataset.idx = i;
  btn.innerHTML = `<img class="mount-thumb" src="${shankThumbSrc(s.code, currentMountColor)}" data-code="${s.code}" alt="${s.name}">
    <span class="mount-name">${s.name}</span><span class="mount-code">${s.code}</span>`;
  mountGrid.appendChild(btn);
});


// ═══════════════════════════════════════════════════
//  UI EVENTS
// ═══════════════════════════════════════════════════
function setActive(btn, selector) {
  document.querySelectorAll(selector).forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

// Head color
document.querySelectorAll('[data-hc]').forEach(btn =>
  btn.addEventListener('click', () => {
    setActive(btn, '[data-hc]');
    currentHeadColor = btn.dataset.hc;
    if (headMesh) tweenColor(headMesh, btn.dataset.hc, false);
  })
);
// Mount color
document.querySelectorAll('[data-mc]').forEach(btn =>
  btn.addEventListener('click', () => {
    setActive(btn, '[data-mc]');
    currentMountColor = btn.dataset.mc;
    if (shankMesh) tweenColor(shankMesh, btn.dataset.mc, true);
    updateMountThumbs(btn.dataset.mc);
  })
);

shapeGrid.addEventListener('click', e => {
  const card = e.target.closest('[data-idx]');
  if (!card) return;
  const newIdx = parseInt(card.dataset.idx);
  if (newIdx === activeShapeIdx) return;
  setActive(card, '#shape-grid [data-idx]');
  const prevSize = getActiveSize();
  activeShapeIdx = newIdx;
  const kept = getActiveShape().sizes.indexOf(prevSize);
  activeSizeIdx = kept >= 0 ? kept : 0;
  buildSizeUI();
  rebuildAssembly();
});

document.getElementById('size-row').addEventListener('click', e => {
  const pill = e.target.closest('[data-idx]');
  if (!pill) return;
  activeSizeIdx = parseInt(pill.dataset.idx);
  setActive(pill, '#size-row .size-pill');
  rebuildAssembly();
});

mountGrid.addEventListener('click', e => {
  const card = e.target.closest('[data-idx]');
  if (!card) return;
  setActive(card, '#mount-grid [data-idx]');
  activeShankIdx = parseInt(card.dataset.idx);
  rebuildAssembly();
});

document.querySelectorAll('[data-cam]').forEach(btn =>
  btn.addEventListener('click', () => {
    camTarget = CAM_PRESETS[btn.dataset.cam].clone();
    controls.autoRotate = false; clearTimeout(autoTimer);
  })
);

// ═══════════════════════════════════════════════════
//  PRELOAD (background, after first render)
// ═══════════════════════════════════════════════════
function preloadAll() {
  const shape = getActiveShape();
  shape.sizes.forEach(sz => {
    ensureModel(HEAD_BASE, `${shape.code}-${sz.replace('.', '')}.glb`).catch(() => {});
  });
  const sk = getActiveShank();
  ['075', '200', '300'].forEach(sfx => {
    if (sfx === '075' && !sk.has075) return;
    ensureModel(SHANK_BASE, `${sk.code}-${sfx}.glb`).catch(() => {});
  });
}

// ═══════════════════════════════════════════════════
//  INITIAL LOAD
// ═══════════════════════════════════════════════════
rebuildAssembly();
setTimeout(preloadAll, 2000);

// ═══════════════════════════════════════════════════
//  RENDER LOOP
// ═══════════════════════════════════════════════════
function animate() {
  requestAnimationFrame(animate);
  if (camTarget) {
    camera.position.lerp(camTarget, 0.07);
    camera.lookAt(controls.target);
    if (camera.position.distanceTo(camTarget) < 0.008) {
      camera.position.copy(camTarget); camTarget = null;
      autoTimer = setTimeout(() => { controls.autoRotate = true; }, 2000);
    }
  }
  controls.update();
  renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
  const w = container.clientWidth, h = container.clientHeight;
  renderer.setSize(w, h); camera.aspect = w / h; camera.updateProjectionMatrix();
});
</script>
</body>
</html>
