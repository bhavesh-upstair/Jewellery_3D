<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ring Designer</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #fff;
      overflow: hidden;
    }

    /* ── HEADER ── */
    .header {
      height: 52px; background: #1A1A1A;
      display: flex; align-items: center; padding: 0 22px;
      flex-shrink: 0; z-index: 20;
    }
    .brand     { color: #B8963E; font-size: 16px; letter-spacing: 0.2em; font-weight: 700; text-transform: uppercase; }
    .brand-sep { width: 1px; height: 16px; background: #3A3A3A; margin: 0 14px; }
    .brand-sub { color: #777; font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; }

    /* ── LAYOUT ── */
    .app  { display: flex; flex-direction: column; height: 100vh; }
    .main { display: flex; flex: 1; overflow: hidden; }

    /* ── VIEWER ── */
    .viewer-wrap { flex: 1; position: relative; background: #fff; }
    #viewer { width: 100%; height: 100%; }

    /* ── LOADING ── */
    .loading {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      background: rgba(255,255,255,0.8); backdrop-filter: blur(2px);
      z-index: 10; transition: opacity 0.3s;
    }
    .loading.hidden { opacity: 0; pointer-events: none; }
    .spinner {
      width: 32px; height: 32px;
      border: 3px solid #DDD6CE; border-top-color: #B8963E;
      border-radius: 50%; animation: spin 0.75s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── CAM BUTTONS ── */
    .cam-btns {
      position: absolute; bottom: 16px; left: 50%; transform: translateX(-50%);
      display: flex; gap: 7px; z-index: 5;
    }
    .cam-btn {
      padding: 5px 13px; border: 1px solid rgba(200,190,180,0.7);
      background: rgba(255,255,255,0.92); backdrop-filter: blur(4px);
      border-radius: 20px; font-size: 11px; letter-spacing: 0.06em;
      cursor: pointer; color: #666; transition: all 0.15s; text-transform: uppercase;
    }
    .cam-btn:hover { color: #B8963E; border-color: #B8963E; }

    /* ── SIDEBAR ── */
    .sidebar {
      width: 300px; background: #fff;
      border-left: 1px solid #EAE4DC;
      overflow-y: auto; flex-shrink: 0;
    }
    .sidebar::-webkit-scrollbar { width: 4px; }
    .sidebar::-webkit-scrollbar-thumb { background: #E0D8D0; border-radius: 4px; }

    /* ── SECTION ── */
    .sec { padding: 16px 18px 14px; border-bottom: 1px solid #F2EDE6; }
    .sec-title {
      font-size: 10px; font-weight: 700; letter-spacing: 0.14em;
      text-transform: uppercase; color: #9A8570; margin-bottom: 12px;
    }

    /* ── COLOR SWATCHES ── */
    .swatch-row { display: flex; gap: 10px; }
    .swatch {
      width: 34px; height: 34px; border-radius: 50%;
      border: 2.5px solid transparent;
      box-shadow: 0 2px 6px rgba(0,0,0,0.15);
      cursor: pointer; transition: all 0.16s; padding: 0;
    }
    .swatch:hover { transform: scale(1.1); }
    .swatch.active {
      border-color: #B8963E;
      box-shadow: 0 0 0 3px rgba(184,150,62,0.2), 0 2px 6px rgba(0,0,0,0.18);
    }
    .sw-w { background: linear-gradient(135deg, #F0F0F0, #B8B8B8 60%, #DCDCDC); }
    .sw-y { background: linear-gradient(135deg, #F6D458, #C8940C 60%, #EAC040); }
    .sw-r { background: linear-gradient(135deg, #EAA898, #C06858 60%, #D88878); }

    /* ── STONE SHAPE GRID ── */
    .shape-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 7px; }
    .shape-card {
      display: flex; flex-direction: column; align-items: center;
      padding: 9px 5px 7px; border: 1.5px solid #E8E2D8;
      border-radius: 9px; background: #FAFAF8;
      cursor: pointer; transition: all 0.16s; gap: 5px; font: inherit;
    }
    .shape-card:hover  { border-color: #C8AA7A; background: #FDF9F3; }
    .shape-card.active { border-color: #B8963E; background: #FDF5E8; }
    .shape-card svg    { width: 36px; height: 36px; }
    .shape-card span   { font-size: 10px; color: #777; letter-spacing: 0.04em; }
    .shape-card.active span { color: #B8963E; font-weight: 600; }

    /* ── MOUNTING GRID ── */
    .mount-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
    .mount-card {
      display: flex; flex-direction: column; align-items: center;
      padding: 10px 8px 8px; border: 1.5px solid #E8E2D8;
      border-radius: 9px; background: #FAFAF8;
      cursor: pointer; transition: all 0.16s; gap: 5px; font: inherit; text-align: center;
    }
    .mount-card:hover  { border-color: #C8AA7A; background: #FDF9F3; }
    .mount-card.active { border-color: #B8963E; background: #FDF5E8; }
    .mount-card svg    { width: 48px; height: 26px; opacity: 0.55; }
    .mount-card.active svg { opacity: 0.9; }
    .mount-name { font-size: 10px; color: #666; line-height: 1.3; }
    .mount-card.active .mount-name { color: #B8963E; font-weight: 600; }
    .mount-code { font-size: 9px; color: #B0A890; letter-spacing: 0.04em; }

    @media (max-width: 700px) {
      html, body { overflow: auto; }
      .app  { height: auto; }
      .main { flex-direction: column; }
      .viewer-wrap { height: 60vw; min-height: 240px; }
      .sidebar { width: 100%; border-left: none; border-top: 1px solid #EAE4DC; }
    }
  </style>
</head>
<body>

<div class="app">
  <header class="header">
    <span class="brand">Ring Studio</span>
    <div class="brand-sep"></div>
    <span class="brand-sub">Design Your Own Ring</span>
  </header>

  <div class="main">

    <!-- 3D VIEWER -->
    <div class="viewer-wrap">
      <div id="viewer"></div>
      <div id="loading" class="loading"><div class="spinner"></div></div>
      <div class="cam-btns">
        <button class="cam-btn" data-cam="front">Front</button>
        <button class="cam-btn" data-cam="angle">Angle</button>
        <button class="cam-btn" data-cam="top">Top</button>
      </div>
    </div>

    <!-- SIDEBAR -->
    <aside class="sidebar">

      <!-- Metal Color — single control for the whole ring -->
      <div class="sec">
        <div class="sec-title">Metal Color</div>
        <div class="swatch-row">
          <button class="swatch sw-w active" data-metal="white"  title="White Gold"></button>
          <button class="swatch sw-y"        data-metal="yellow" title="Yellow Gold"></button>
          <button class="swatch sw-r"        data-metal="rose"   title="Rose Gold"></button>
        </div>
      </div>

      <!-- Stone Shape -->
      <div class="sec">
        <div class="sec-title">Center Stone Shape</div>
        <div class="shape-grid" id="shape-grid"></div>
      </div>

      <!-- Ring Band -->
      <div class="sec">
        <div class="sec-title">Ring Band</div>
        <div class="mount-grid" id="mount-grid"></div>
      </div>

    </aside>
  </div>
</div>

            <path d="M18 9 Q25 18 18 27 Q11 18 18 9Z" stroke="#C8AA7A" stroke-dasharray="2 2.5" stroke-width="1" fill="none" opacity=".6"/>`

            <rect x="11" y="9" width="14" height="18" rx="2" stroke="#C8AA7A" stroke-dasharray="2 2.5" stroke-width="1" fill="none" opacity=".6"/>`

<script type="importmap">
{
  "imports": {
    "three":         "https://unpkg.com/three@0.163.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.163.0/examples/jsm/"

<script type="module">
import * as THREE from 'three';
import { OrbitControls }   from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader }      from 'three/addons/loaders/GLTFLoader.js';
import { DRACOLoader }     from 'three/addons/loaders/DRACOLoader.js';
import { RGBELoader }      from 'three/addons/loaders/RGBELoader.js';
import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';

/* ── pull in global config ── */
const CFG         = window.RING_CONFIG;
const HEAD_BASE   = CFG.headsPath;
const SHANK_BASE  = CFG.shanksPath;
const TARGET_SIZE = CFG.targetSize;
const HEAD_OFFSET_Y = CFG.headOffsetY ?? 0.015;
const METALS      = CFG.metals;
const HEADS_DATA  = CFG.heads;
const SHANKS_DATA = CFG.shanks;
const CAM_PRESETS = Object.fromEntries(
  Object.entries(CFG.cameraPresets).map(([k, v]) => [k, new THREE.Vector3(...v)])
);

/* ── state ── */
let ringAssembly = null;
let shankMesh    = null;
let headMesh     = null;
let activeShank  = SHANKS_DATA[0];
let activeHead   = HEADS_DATA[0];
let camTarget    = null;
let autoTimer    = null;
let pendingLoads = 0;
let rebuildToken = 0;
const modelCache = {};
let currentMetal = 'white';   // single metal colour for the whole ring

/* ── renderer ── */
const container = document.getElementById('viewer');
const renderer  = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(container.clientWidth, container.clientHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.42;
container.appendChild(renderer.domElement);

/* ── scene + environment ── */
const scene = new THREE.Scene();
scene.background = new THREE.Color(0xffffff);

const pmrem = new THREE.PMREMGenerator(renderer);
pmrem.compileEquirectangularShader();
scene.environment = pmrem.fromScene(new RoomEnvironment(), 0.04).texture;
scene.environmentIntensity = 2;

new RGBELoader().load(
  'https://dl.polyhaven.org/file/ph-assets/HDRIs/hdr/1k/studio_small_09_1k.hdr',
  tex => {
    tex.mapping = THREE.EquirectangularReflectionMapping;
    scene.environment = pmrem.fromEquirectangular(tex).texture;
    scene.environmentIntensity = 2;
    tex.dispose(); pmrem.dispose();
  }
);

function createGemRefractionEnv() {
  const envScene = new THREE.Scene();
  envScene.background = new THREE.Color(0xf2f4f7);

  const panels = [];
  const addPanel = (w, h, color, intensity, position, rotation) => {
    const mat = new THREE.MeshBasicMaterial({
      color: new THREE.Color(color).multiplyScalar(intensity),
      side: THREE.DoubleSide,
    });
    const mesh = new THREE.Mesh(new THREE.PlaneGeometry(w, h), mat);
    mesh.position.copy(position);
    mesh.rotation.copy(rotation);
    envScene.add(mesh);
    panels.push(mesh);
  };

  addPanel(7.5, 2.4, 0xffffff, 0.90, new THREE.Vector3(0, 3.3, 0.2), new THREE.Euler(Math.PI / 2, 0, 0));
  addPanel(3.4, 2.0, 0xffffff, 0.48, new THREE.Vector3(2.7, 1.5, 1.8), new THREE.Euler(0, -0.75, 0));
  addPanel(3.4, 2.0, 0xffffff, 0.45, new THREE.Vector3(-2.7, 1.4, 1.6), new THREE.Euler(0, 0.78, 0));
  addPanel(5.0, 1.6, 0xffffff, 0.24, new THREE.Vector3(0, 0.8, -3.4), new THREE.Euler(0, Math.PI, 0));
  addPanel(1.0, 1.0, 0xffffff, 0.56, new THREE.Vector3(0.45, 2.2, 2.7), new THREE.Euler(0, Math.PI, 0));
  addPanel(0.9, 0.9, 0xffffff, 0.50, new THREE.Vector3(-0.65, 2.0, 2.4), new THREE.Euler(0.08, Math.PI * 0.92, 0));

  const strip = new THREE.Mesh(
    new THREE.PlaneGeometry(7.0, 0.85),
      new THREE.MeshBasicMaterial({
      color: new THREE.Color(0xd8dde6).multiplyScalar(0.12),
      side: THREE.DoubleSide,
    })
  );
  strip.position.set(0, 0.15, 3.0);
  envScene.add(strip);
  panels.push(strip);

  const cubeRT = new THREE.WebGLCubeRenderTarget(512, {
    minFilter: THREE.LinearFilter,
    magFilter: THREE.LinearFilter,
    generateMipmaps: false,
    depthBuffer: false,
    colorSpace: THREE.LinearSRGBColorSpace,
  });
  const cubeCam = new THREE.CubeCamera(0.1, 20, cubeRT);
  cubeCam.update(renderer, envScene);

  for (const panel of panels) {
    panel.geometry.dispose();
    panel.material.dispose();
  }

  return cubeRT.texture;
}

const gemRefractionEnv = createGemRefractionEnv();

/* ── camera + controls ── */
const camera = new THREE.PerspectiveCamera(30, container.clientWidth / container.clientHeight, 0.01, 100);
camera.position.copy(CAM_PRESETS.front);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping   = true;
controls.dampingFactor   = 0.06;
controls.target.set(0, 0.05, 0);
controls.minDistance     = 0.4;
controls.maxDistance     = 4;
controls.autoRotate      = true;
controls.autoRotateSpeed = 1.2;

renderer.domElement.addEventListener('pointerdown', () => {
  controls.autoRotate = false; clearTimeout(autoTimer); camTarget = null;
});
renderer.domElement.addEventListener('pointerup', () => {
  autoTimer = setTimeout(() => { controls.autoRotate = true; }, 3000);
});

/* ── lights ── */
scene.add(new THREE.AmbientLight(0xffffff, 0.50));
const key  = new THREE.DirectionalLight(0xFFF8F0, 1.8); key.position.set(2, 4, 3);   scene.add(key);
const fill = new THREE.DirectionalLight(0xF0F4FF, 1.0); fill.position.set(-3, 2, 4); scene.add(fill);
const rim  = new THREE.DirectionalLight(0xFFF8EC, 0.75); rim.position.set(0, 3, -4); scene.add(rim);
const bot  = new THREE.DirectionalLight(0xE8EEFF, 0.40); bot.position.set(0, -3, 2); scene.add(bot);

/* ── contact shadow ── */
const shadowTex = (() => {
  const s = 128, c = document.createElement('canvas');
  c.width = c.height = s;
  const ctx = c.getContext('2d');
  const g = ctx.createRadialGradient(s/2, s/2, 0, s/2, s/2, s/2);
  g.addColorStop(0,   'rgba(0,0,0,0.10)');
  g.addColorStop(0.4, 'rgba(0,0,0,0.04)');
  g.addColorStop(1,   'rgba(0,0,0,0)');
  ctx.fillStyle = g; ctx.fillRect(0, 0, s, s);
  return new THREE.CanvasTexture(c);
})();
const gnd = new THREE.Mesh(
  new THREE.PlaneGeometry(TARGET_SIZE * 2.2, TARGET_SIZE * 2.2),
  new THREE.MeshBasicMaterial({ map: shadowTex, transparent: true, depthWrite: false })
);
gnd.rotation.x = -Math.PI / 2;
gnd.position.y = -TARGET_SIZE * 0.26;
scene.add(gnd);

/* ── loader ── */
const dracoLoader = new DRACOLoader();
dracoLoader.setDecoderPath('https://unpkg.com/three@0.163.0/examples/jsm/libs/draco/');
const loader = new GLTFLoader();
loader.setDRACOLoader(dracoLoader);

const loadingEl = document.getElementById('loading');
function showLoading() { pendingLoads++; loadingEl.classList.remove('hidden'); }
function hideLoading() { if (--pendingLoads <= 0) { pendingLoads = 0; loadingEl.classList.add('hidden'); } }

/* ── tweening ── */
function tween(from, to, ms, ease, onUpdate, onDone) {
  const t0 = performance.now();
  (function step(now) {
    const p = Math.min((now - t0) / ms, 1);
    onUpdate(from + (to - from) * ease(p));
    p < 1 ? requestAnimationFrame(step) : onDone?.();
  })(t0);
}
const easeInOut = p => p < 0.5 ? 2*p*p : 1 - Math.pow(-2*p+2, 2)/2;

function setOpacity(obj, v) {
  obj.traverse(c => {
    if (!c.isMesh) return;
    (Array.isArray(c.material) ? c.material : [c.material])
      .forEach(m => { m.transparent = true; m.opacity = v; });
  });
}

function crossDissolve(oldObj, newObj) {
  setOpacity(newObj, 0);
  scene.add(newObj);
  newObj.updateMatrixWorld(true);
  tween(0, 1, 380, easeInOut, v => {
    if (oldObj) setOpacity(oldObj, 1 - v);
    setOpacity(newObj, v);
  }, () => {
    if (oldObj) scene.remove(oldObj);
    newObj.traverse(c => {
      if (!c.isMesh) return;
      (Array.isArray(c.material) ? c.material : [c.material])
        .forEach(m => { m.opacity = 1; m.transparent = m.transmission > 0; });
    });
  });
}

/* ── normalise ── */
function getModelKey(base, file) {
  return `${base}${file}`;
}

function ensureModel(base, file) {
  const key = getModelKey(base, file);
  if (modelCache[key]) return Promise.resolve(modelCache[key]);
  return new Promise((resolve, reject) => {
    loader.load(
      base + file,
      gltf => {
        modelCache[key] = gltf.scene;
        resolve(gltf.scene);
      },
      undefined,
      reject
    );
  });
}

function fitAssemblyGroup(group, shank) {
  shank.updateMatrixWorld(true);
  const shankBox = new THREE.Box3().setFromObject(shank);
  const shankSize = shankBox.getSize(new THREE.Vector3());
  const shankMaxDim = Math.max(shankSize.x, shankSize.y, shankSize.z);
  const scale = shankMaxDim > 0 ? TARGET_SIZE / shankMaxDim : 1;

  group.scale.setScalar(scale);
  group.updateMatrixWorld(true);

  const fullBox = new THREE.Box3().setFromObject(group);
  const fullCenter = fullBox.getCenter(new THREE.Vector3());
  group.position.copy(fullCenter.multiplyScalar(-1));
  group.updateMatrixWorld(true);
}

function buildRingAssembly(shankSrc, headSrc) {
  const assembly = new THREE.Group();
  const shank = shankSrc.clone(true);
  const head = headSrc.clone(true);

  // Keep the exported local relationship between lower mount and top assembly.
  shank.position.set(0, 0, 0);
  head.position.set(0, HEAD_OFFSET_Y, 0);

  applyMaterials(shank, true);
  applyMaterials(head, false);

  assembly.add(shank);
  assembly.add(head);
  fitAssemblyGroup(assembly, shank);

  return { assembly, shank, head };
}


/*
 * positionHead — flush-mounts the stone setting on top of the ring band.
 *
 * Aligns the bottom of the head model (sb.min.y) with stoneTargetY,
 * then tucks it slightly into the shank so the seat looks flush.
 * Use headY in RING_CONFIG.shanks[].headY to fine-tune per-band:
 *   negative = slide the head down (close a gap)
 *   positive = raise the head higher
 */

/* ════════════════════════════════════════════════════════════
 * GEM SHADER  — physically-based ray-traced diamond material
 * ════════════════════════════════════════════════════════════ */
function buildGemMaterial(geometry) {
  const geo    = geometry.clone();
  const tmpBox = new THREE.Box3().setFromBufferAttribute(geo.attributes.position);
  const ctr    = tmpBox.getCenter(new THREE.Vector3());
  geo.applyMatrix4(new THREE.Matrix4().makeTranslation(-ctr.x, -ctr.y, -ctr.z));

  const pos = geo.attributes.position.array;
  let minR = Infinity, maxR = 0;
  for (let i = 0; i < pos.length; i += 3) {
    const d = Math.sqrt(pos[i]*pos[i] + pos[i+1]*pos[i+1] + pos[i+2]*pos[i+2]);
    if (d < minR) minR = d;
    if (d > maxR) maxR = d;
  }
  if (!isFinite(minR) || minR <= 0) minR = maxR * 0.4;

  const cubeRT = new THREE.WebGLCubeRenderTarget(512, {
    minFilter: THREE.NearestFilter, magFilter: THREE.NearestFilter,
    generateMipmaps: false, depthBuffer: false,
    colorSpace: THREE.LinearSRGBColorSpace,
  });
  const bakeMat = new THREE.ShaderMaterial({
    side: THREE.BackSide, blending: THREE.NoBlending,
    uniforms: { u0: { value: minR }, u1: { value: maxR } },
    vertexShader: `varying vec3 vP,vN;
      void main(){vP=position;vN=normalize(normal);
        gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1);}`,
    fragmentShader: `precision mediump float;
      uniform float u0,u1;varying vec3 vP,vN;
      void main(){gl_FragColor=vec4(0.5+0.5*normalize(vN),(length(vP)-u0)/(u1-u0));}`,
  });
  const bakeScene = new THREE.Scene();
  bakeScene.add(new THREE.Mesh(geo, bakeMat));
  new THREE.CubeCamera(minR * 0.01, maxR * 10, cubeRT).update(renderer, bakeScene);

  const u = {
    uEye:    { value: new THREE.Vector3() },
    uAbsorb: { value: new THREE.Vector3(0.00016, 0.00015, 0.00014) },
    uDisp:   { value: new THREE.Vector3(2.4025, 2.4200, 2.4375) },
    uGemTint: { value: new THREE.Color(0xBBBBBB) },
    uGemMap: { value: cubeRT.texture },
    uGemEnvMap: { value: gemRefractionEnv },
    uGemEnvIntensity: { value: 1.55 },
    uReflStrength: { value: 0.13 },
    uMinR:   { value: minR },
    uMaxR:   { value: maxR },
    uCtr:    { value: ctr },
    uEnvRot: { value: new THREE.Matrix4() },
  };

  const mat = new THREE.ShaderMaterial({
    uniforms: u,
    blending: THREE.NoBlending,
    vertexShader: `
      varying vec3 vPos, vNor;
      void main() {
        gl_Position = projectionMatrix * modelViewMatrix * vec4(position,1.0);
        vPos = position; vNor = normalize(normal);
      }`,
    fragmentShader: `
      precision highp float;
      uniform vec3 uEye, uAbsorb, uDisp, uCtr, uGemTint;
      uniform float uMinR, uMaxR;
      uniform float uGemEnvIntensity, uReflStrength;
      uniform mat4  uEnvRot;
      uniform samplerCube uGemMap, uGemEnvMap;
      varying vec3 vPos, vNor;

      vec3 gemEnv(vec3 d) {
        d = normalize((uEnvRot * vec4(d,0.0)).xyz);

        float up = clamp(d.y * 0.5 + 0.5, 0.0, 1.0);
        float horizon = pow(1.0 - abs(d.y), 2.15);

        vec3 sampled = textureCube(uGemEnvMap, d).rgb;
        vec3 env = mix(vec3(0.62, 0.64, 0.68), sampled, 0.55) * uGemEnvIntensity;
        vec3 baseLift =
          vec3(0.090, 0.094, 0.100) * (0.32 + 0.68 * pow(up, 0.95)) +
          vec3(0.030, 0.032, 0.036) * (0.18 + 0.42 * horizon);

        float B0 = pow(max(0.0, dot(d, normalize(vec3( 0.00, 0.99, 0.14)))), 18.0) * 0.15;
        float B1 = pow(max(0.0, dot(d, normalize(vec3( 0.48, 0.83, 0.28)))), 24.0) * 0.08;
        float B2 = pow(max(0.0, dot(d, normalize(vec3(-0.50, 0.82, 0.18)))), 24.0) * 0.08;

        float pinA = pow(max(0.0, dot(d, normalize(vec3( 0.00, 0.99, 0.10)))), 140.0) * 0.07;
        float pinB = pow(max(0.0, dot(d, normalize(vec3( 0.28, 0.94, 0.16)))), 110.0) * 0.04;
        float pinC = pow(max(0.0, dot(d, normalize(vec3(-0.30, 0.92, 0.10)))), 110.0) * 0.035;

        float darkBand = pow(max(0.0, dot(d, normalize(vec3(0.0, -0.03, 1.0)))), 8.0) * 0.006;
        vec3 softboxes = vec3(1.00, 1.01, 1.02) * (B0 + B1 + B2);
        vec3 pinFire = vec3(1.03, 1.01, 0.99) * (pinA + pinB + pinC);

        return max(env * 0.82 + baseLift + softboxes + pinFire - vec3(darkBand), vec3(0.16));
      }
      float fresnel(vec3 i,vec3 n,float ior){
        float cI=abs(dot(i,n)),s2=(1.0/ior)*(1.0/ior)*(1.0-cI*cI);
        if(s2>=1.0)return 1.0;
        float cT=sqrt(1.0-s2),rs=(cI-ior*cT)/(cI+ior*cT),rp=(ior*cT-cI)/(ior*cT+cI);
        return 0.5*(rs*rs+rp*rp);
      }
      float gemHit(vec3 p,vec3 d,out vec3 hn){
        float dp=dot(p,d),delta=sqrt(max(0.0,dp*dp-dot(p,p)+uMaxR*uMaxR));
        float t0=0.0,t1=-dp+delta;
        for(int i=0;i<12;i++){
          float tm=0.5*(t0+t1); vec3 pp=p+tm*d;
          vec4 s=textureCube(uGemMap,normalize(pp));
          float r=mix(uMinR,uMaxR,s.a); vec3 nn=normalize(2.0*s.rgb-1.0);
          if(length(pp)>r&&dot(d,nn)>0.0)t1=tm;else t0=tm;
        }
        float t=0.5*(t0+t1); vec4 s=textureCube(uGemMap,normalize(p+t*d));
        hn=normalize(2.0*s.rgb-1.0); return t;
      }
      vec3 traceChannel(vec3 p,vec3 d,float ior){
        float inv=1.0/ior,w=1.0,dist=0.0; vec3 col=vec3(0.0);
        for(int i=0;i<6;i++){
          vec3 hn; float t=gemHit(p,d,hn); dist+=t; p+=t*d;
          vec3 rf=refract(d,-hn,ior); bool tir=(dot(rf,rf)<0.01);
          float R=tir?1.0:fresnel(d,-hn,inv);
          if(!tir) col+=w*(1.0-R)*gemEnv(rf)*exp(-uAbsorb*dist);
          w*=R; d=reflect(d,-hn);
          if(w<0.004)break;
        }
        return col+w*gemEnv(d)*exp(-uAbsorb*dist);
      }
      void main(){
        vec3 lp=vPos-uCtr, eye=normalize(lp-(uEye-uCtr)), n=normalize(vNor);
        vec3 rc=traceChannel(lp,refract(eye,n,1.0/uDisp.x),uDisp.x);
        vec3 gc=traceChannel(lp,refract(eye,n,1.0/uDisp.y),uDisp.y);
        vec3 bc=traceChannel(lp,refract(eye,n,1.0/uDisp.z),uDisp.z);
        float R_entry=fresnel(eye,n,uDisp.y);
        float faceOn = pow(clamp(abs(dot(eye, n)), 0.0, 1.0), 4.0);
        vec3 traced = max(vec3(rc.r, gc.g, bc.b), vec3(0.0));
        vec3 attenuation = mix(vec3(1.0), uGemTint, 0.03);
        traced *= attenuation;

        vec3 reflection = gemEnv(reflect(eye,n)) * (uReflStrength * mix(1.18, 0.92, faceOn));
        vec3 faceLight = gemEnv(-eye) * mix(0.052, 0.020, faceOn);
        vec3 tableLift = vec3(0.030, 0.032, 0.036) * faceOn;
        traced = pow(traced, vec3(1.01 + faceOn * 0.025)) + tableLift;

        vec3 finalColor = traced * (1.0 - R_entry) + reflection * R_entry + faceLight;
        vec3 compressed = finalColor / (1.0 + finalColor * 0.46);
        finalColor = mix(finalColor, compressed, 0.14 + faceOn * 0.24);
        gl_FragColor=vec4(finalColor,1.0);
      }`,
  });

  mat.onBeforeRender = (rdr, scn, cam, geom, obj) => {
    obj.updateWorldMatrix(true, false);
    u.uEye.value.copy(cam.position).applyMatrix4(obj.matrixWorld.clone().invert());
    u.uEnvRot.value.extractRotation(obj.matrixWorld);
  };
  return mat;
}

/* ── gem tagging ──────────────────────────────────────────────────
 *
 * Priority chain (stops at first match):
 *  1. Mesh name hint  (gem/stone/diamond…)
 *  2. GLTF transmission > 0   → gem material set in authoring tool
 *  3. Genuine metalness split  → some metal, some not
 *  4. Low-roughness (< 0.05) + low-metalness split → polished stone
 *  5. Geometry score = equidimensionality × bounding-volume
 *     A diamond is a solid compact shape (high score).
 *     Prongs are thin cylinders (low score). Basket is a hollow
 *     ring (low score). Works regardless of vertex counts.
 *
 * Debug: open the browser console — mesh details are logged every
 * time a head model loads so you can verify which mesh is tagged.
 */
function tagHeadGem(group) {
  // 1) Named hints
  let namedGems = 0;
  group.traverse(c => {
    if (!c.isMesh) return;
    if (/gem|stone|diamond|center|crystal|(?:^|[_-])d(?:$|[_-])/i.test(c.name)) { c._isGem = true; namedGems++; }
  });
  if (namedGems > 0) return;

  const meshes = [];
  group.traverse(c => { if (c.isMesh) meshes.push(c); });

  // 2) Transmission material → definite gem
  let transGems = 0;
  meshes.forEach(c => {
    const mat = Array.isArray(c.material) ? c.material[0] : c.material;
    if (mat && (mat.transmission ?? 0) > 0) { c._isGem = true; transGems++; }
  });
  if (transGems > 0) return;

  // 3) Genuine metalness split (some > 0.5, some ≤ 0.5)
  const metalMeshes = meshes.filter(c => {
    const mat = Array.isArray(c.material) ? c.material[0] : c.material;
    return mat && (mat.metalness ?? 0) > 0.5;
  });
  if (metalMeshes.length > 0 && metalMeshes.length < meshes.length) {
    meshes.forEach(c => {
      const mat = Array.isArray(c.material) ? c.material[0] : c.material;
      if (!mat || (mat.metalness ?? 0) <= 0.5) c._isGem = true;
    });
    return;
  }

  // 4) Low-roughness split: stone = perfectly polished (roughness≈0)
  const smooth = meshes.filter(c => {
    const mat = Array.isArray(c.material) ? c.material[0] : c.material;
    return mat && (mat.roughness ?? 1) < 0.05 && (mat.metalness ?? 0) < 0.5;
  });
  if (smooth.length > 0 && smooth.length < meshes.length) {
    smooth.forEach(c => c._isGem = true);
    return;
  }

  // 5) Geometry heuristic — central & high.
  //    In every ring head model the stone sits at the XZ centre of the
  //    setting and is the topmost element.
  //    Prongs are laterally offset → penalised by their XZ distance.
  //    Basket is below → penalised by lower Y centroid.
  //    Score = centroid.y  −  xzOffset × 2
  group.updateWorldMatrix(true, true);
  const gBox    = new THREE.Box3().setFromObject(group);
  const gCenter = gBox.getCenter(new THREE.Vector3());

  let best = null, bestScore = -Infinity;
  console.group('Head gem detection');
  meshes.forEach(c => {
    const pos = c.geometry.attributes.position;
    if (!pos) return;
    const mat  = Array.isArray(c.material) ? c.material[0] : c.material;
    const b    = new THREE.Box3().setFromObject(c);
    const cc   = b.getCenter(new THREE.Vector3());
    const dx   = cc.x - gCenter.x, dz = cc.z - gCenter.z;
    const xzD  = Math.sqrt(dx*dx + dz*dz);
    const score = cc.y - xzD * 2.0;
    console.log(
      `  "${c.name || '(unnamed)'}"`
      + `  verts=${pos.count}`
      + `  m=${mat?.metalness?.toFixed(2)??'?'}`
      + `  r=${mat?.roughness?.toFixed(2)??'?'}`
      + `  t=${mat?.transmission?.toFixed(2)??'?'}`
      + `  cy=${cc.y.toFixed(3)}  xzD=${xzD.toFixed(3)}  score=${score.toFixed(3)}`
    );
    if (score > bestScore) { bestScore = score; best = c; }
  });
  if (best) {
    best._isGem = true;
    console.log(`  → gem: "${best.name || '(unnamed)'}"  score ${bestScore.toFixed(3)}`);
  }
  console.groupEnd();
}

/*
 * Shank (band) gems — pavé accent stones only.
 * We auto-detect pave only when there are clearly many (≥8) tiny meshes.
 * Prong meshes are small but few (4-6); this threshold avoids false positives.
 */
function tagShankGems(group) {
  const meshes = [];
  group.traverse(c => { if (c.isMesh) meshes.push(c); });
  if (meshes.length <= 1) return;

  let anyNamed = false;
  for (const c of meshes) {
    if (/gem|stone|diamond|crystal|pave|pavé|accent/i.test(c.name)) { c._isGem = true; anyNamed = true; }
  }
  if (anyNamed) return;

  // Auto-detect pave: many small meshes (≥8) each < 8 % of largest mesh
  const maxV  = Math.max(...meshes.map(c => c.geometry.attributes.position?.count || 0));
  const tiny  = meshes.filter(c => {
    const v = c.geometry.attributes.position?.count || 0;
    return v > 0 && v < maxV * 0.08;
  });
  if (tiny.length >= 8) tiny.forEach(c => c._isGem = true);
}

function isGemMesh(c) { return c._isGem === true; }

/* ── apply materials ── */
function applyMaterials(mesh, isShank) {
  const m = METALS[currentMetal];
  if (isShank) tagShankGems(mesh);
  else         tagHeadGem(mesh);

  mesh.traverse(c => {
    if (!c.isMesh) return;
    c.geometry.computeVertexNormals();

    if (isGemMesh(c)) {
      c.material = isShank
        ? new THREE.MeshPhysicalMaterial({  // pavé accent (lightweight)
            color: 0xEEF4FF, roughness: 0.0, metalness: 0,
            transmission: 0.90, ior: 2.42, thickness: 0.3,
            dispersion: 1.5, specularIntensity: 1.0, reflectivity: 1.0,
            envMapIntensity: 6.0, transparent: true,
          })
        : buildGemMaterial(c.geometry);    // center stone (ray-traced)
    } else {
      c.material = new THREE.MeshPhysicalMaterial({
        color: m.color, metalness: m.metalness, roughness: m.roughness,
        envMapIntensity: 7.0, reflectivity: 1.0,
      });
    }
  });
}

function tweenColor(mesh, metalName) {
  const toColor = new THREE.Color(METALS[metalName].color);
  const states  = [];
  mesh.traverse(c => {
    if (!c.isMesh || isGemMesh(c)) return;
    states.push({ mat: c.material, from: c.material.color.clone() });
  });
  tween(0, 1, 500, easeInOut, v => {
    states.forEach(({ mat, from }) => mat.color.lerpColors(from, toColor, v));
  });
}

/* ── load shank (ring band) ── */
async function rebuildAssembly() {
  const token = ++rebuildToken;
  const old = ringAssembly;
  showLoading();

  try {
    const [shankSrc, headSrc] = await Promise.all([
      ensureModel(SHANK_BASE, activeShank.file),
      ensureModel(HEAD_BASE, activeHead.file),
    ]);

    if (token !== rebuildToken) return;

    const built = buildRingAssembly(shankSrc, headSrc);
    ringAssembly = built.assembly;
    shankMesh = built.shank;
    headMesh = built.head;
    crossDissolve(old, ringAssembly);
  } catch (err) {
    console.error('Failed to rebuild ring assembly', err);
  } finally {
    hideLoading();
  }
}

function loadShank(file) {
  activeShank = SHANKS_DATA.find(s => s.file === file) ?? activeShank;
  rebuildAssembly();
}

/* ── load head (stone shape) ── */
function loadHead(file) {
  activeHead = HEADS_DATA.find(h => h.file === file) ?? activeHead;
  rebuildAssembly();
}

/* ── build UI ── */
const ringIcon = `<svg viewBox="0 0 48 26" fill="none" stroke="#9A8570" stroke-width="1.3" stroke-linecap="round">
  <path d="M4,23 Q4,5 24,4 Q44,5 44,23"/>
  <path d="M18,4 L24,1 L30,4"/>
  <circle cx="24" cy="1.5" r="2" fill="#B8963E" stroke="none"/>
</svg>`;

const shapeGrid = document.getElementById('shape-grid');
HEADS_DATA.forEach((h, i) => {
  const btn = document.createElement('button');
  btn.className = 'shape-card' + (i === 0 ? ' active' : '');
  btn.dataset.file = h.file;
  btn.innerHTML = `<svg viewBox="0 0 36 36">${h.svg}</svg><span>${h.label}</span>`;
  shapeGrid.appendChild(btn);
});

const mountGrid = document.getElementById('mount-grid');
SHANKS_DATA.forEach((s, i) => {
  const btn = document.createElement('button');
  btn.className = 'mount-card' + (i === 0 ? ' active' : '');
  btn.dataset.file = s.file;
  btn.innerHTML = `${ringIcon}<span class="mount-name">${s.name}</span><span class="mount-code">${s.code}</span>`;
  mountGrid.appendChild(btn);
});

/* ── UI events ── */
function setActive(btn, selector) {
  document.querySelectorAll(selector).forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

// Single metal-colour swatch applies to both shank and head
document.querySelectorAll('[data-metal]').forEach(btn =>
  btn.addEventListener('click', () => {
    setActive(btn, '[data-metal]');
    currentMetal = btn.dataset.metal;
    if (shankMesh) tweenColor(shankMesh, currentMetal);
    if (headMesh)  tweenColor(headMesh,  currentMetal);
  })
);

shapeGrid.addEventListener('click', e => {
  const card = e.target.closest('[data-file]');
  if (!card) return;
  setActive(card, '#shape-grid [data-file]');
  loadHead(card.dataset.file);
});

mountGrid.addEventListener('click', e => {
  const card = e.target.closest('[data-file]');
  if (!card) return;
  setActive(card, '#mount-grid [data-file]');
  loadShank(card.dataset.file);
});

document.querySelectorAll('[data-cam]').forEach(btn =>
  btn.addEventListener('click', () => {
    camTarget = CAM_PRESETS[btn.dataset.cam].clone();
    controls.autoRotate = false; clearTimeout(autoTimer);
  })
);

/* ── background preload ── */
function preloadAll() {
  HEADS_DATA.forEach(h => {
    ensureModel(HEAD_BASE, h.file).catch(() => {});
  });
  SHANKS_DATA.forEach(s => {
    ensureModel(SHANK_BASE, s.file).catch(() => {});
  });
}

/* ── initial load ── */
rebuildAssembly();
setTimeout(preloadAll, 2000);

/* ── render loop ── */
function animate() {
  requestAnimationFrame(animate);
  if (camTarget) {
    camera.position.lerp(camTarget, 0.07);
    camera.lookAt(controls.target);
    if (camera.position.distanceTo(camTarget) < 0.008) {
      camera.position.copy(camTarget); camTarget = null;
      autoTimer = setTimeout(() => { controls.autoRotate = true; }, 2000);
    }
  }
  controls.update();
  renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
  const w = container.clientWidth, h = container.clientHeight;
  renderer.setSize(w, h); camera.aspect = w / h; camera.updateProjectionMatrix();
});
</script>
</body>
